<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Sobralbus</title>
  <link rel="icon" type="image/png" href="assets/fotos/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Barlow',sans-serif;background:#f4f6f9;color:#0d1b2a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .code{font-size:7rem;font-weight:900;color:#2554A2;line-height:1;opacity:.12;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;user-select:none}
    .box{position:relative;z-index:1;max-width:440px}
    .icon{font-size:3.5rem;margin-bottom:1rem}
    h1{font-size:1.6rem;font-weight:900;margin-bottom:.75rem;color:#0d1b2a}
    p{font-size:.95rem;color:#5c6b7a;line-height:1.7;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.875rem 1.75rem;background:#2554A2;color:#fff;border-radius:.5rem;font-family:'Barlow',sans-serif;font-size:.9rem;font-weight:800;text-decoration:none;transition:.2s}
    .btn:hover{background:#1a3e80;transform:translateY(-2px)}
    .btn-wa{background:#25D366;margin-left:.75rem}
    .btn-wa:hover{background:#1db954}
    .btns{display:flex;justify-content:center;flex-wrap:wrap;gap:.75rem}
    .logo-img{width:160px;margin:0 auto 2rem;display:block}
  </style>
</head>
<body>
  <div style="position:relative;width:100%">
    <div class="code">404</div>
    <div class="box">
      <img src="assets/fotos/logo.png" alt="SobralBus" class="logo-img" onerror="this.style.display='none'">
      <h1>Página não encontrada</h1>
      <p>Parece que o ônibus tomou outro caminho! A página que você procura não existe ou foi movida. Volte ao catálogo e encontre o veículo ideal.</p>
      <div class="btns">
        <a href="/" class="btn">← Voltar ao Catálogo</a>
        <a href="https://wa.me/5588996930066" target="_blank" class="btn btn-wa"> Falar no WhatsApp</a>
      </div>
    </div>
  </div>
</body>
</html>
